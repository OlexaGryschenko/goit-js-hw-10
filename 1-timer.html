<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer</title>
    <script type="module" crossorigin src="/vanilla-app-template/assets/timer-BK-IMkhr.js"></script>
    <link rel="modulepreload" crossorigin href="/vanilla-app-template/assets/iziToast.min-BgXGb7uI.js">
    <link rel="stylesheet" crossorigin href="/vanilla-app-template/assets/iziToast-D_nxXpU-.css">
    <link rel="stylesheet" crossorigin href="/vanilla-app-template/assets/timer-CksuuEqD.css">
    <link rel="stylesheet" crossorigin href="/vanilla-app-template/assets/styles-BKwlEUyG.css">
  </head>
  <body>
    <main>
      <a href="/index.html">Go back</a>      
      <input type="text" id="datetime-picker" />
      
<button type="button" data-start>Start</button>

<div class="timer">
  <div class="field">
    <span class="value" data-days>00</span>
    <span class="label">Days</span>
  </div>
  <div class="field">
    <span class="value" data-hours>00</span>
    <span class="label">Hours</span>
  </div>
  <div class="field">
    <span class="value" data-minutes>00</span>
    <span class="label">Minutes</span>
  </div>
  <div class="field">
    <span class="value" data-seconds>00</span>
    <span class="label">Seconds</span>
  </div>
</div>
   
    
    </main>

  </body>
</html>
